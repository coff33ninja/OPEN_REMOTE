name: openremote_android
description: OpenRemote Android client
publish_to: none

version: 0.1.4+5

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  file_picker: ^10.3.10
  flutter:
    sdk: flutter
  mobile_scanner: ^7.2.0
  multicast_dns: ^0.3.3
  path: ^1.9.1
  receive_sharing_intent: ^1.8.1
  shared_preferences: ^2.5.4

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
  assets:
    - assets/remotes/media_remote.json
    - assets/remotes/meeting_controls.json
    - assets/remotes/mouse_touchpad.json
    - assets/remotes/movie_mode.json
    - assets/remotes/power_controls.json
    - assets/remotes/presentation_remote.json
